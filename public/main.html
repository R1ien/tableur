<!DOCTYPE html>
<html>
<head>
<title>Semaines</title>
  <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
<h2>Mes semaines</h2>

<input id="weekInput" placeholder="Nouvelle semaine">
<button onclick="addWeek()">Ajouter</button>

<ul id="weekList"></ul>

<button onclick="saveWeeks()">Sauvegarder</button>
</div>
<script>
let weeks = [];

async function loadWeeks() {
  const res = await fetch("/weeks", {
    credentials: "include"
  });

  if (!res.ok) {
    window.location.href = "/";
    return;
  }

  weeks = await res.json();
  render();
}

function render() {
  const list = document.getElementById("weekList");
  list.innerHTML = "";

  weeks.forEach((week, index) => {
    const li = document.createElement("li");
    li.textContent = week;

    li.onclick = () => {
      weeks.splice(index, 1);
      render();
    };

    list.appendChild(li);
  });
}

function addWeek() {
  const input = document.getElementById("weekInput");
  if (input.value.trim() !== "") {
    weeks.push(input.value.trim());
    input.value = "";
    render();
  }
}

async function saveWeeks() {
  await fetch("/weeks", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ weeks })
  });

  alert("Sauvegardé sur MongoDB !");
}

loadWeeks();
</script>

</body>
</html>
